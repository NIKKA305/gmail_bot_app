<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0e1621; color: white; padding: 20px; text-align: center; }
        .box { border: 2px solid #2481cc; padding: 20px; border-radius: 15px; margin-top: 50px; }
    </style>
</head>
<body>
    <h1>Gmail Dashboard</h1>
    <div class="box">
        <p>ඔබේ ගිණුම් තොරතුරු මෙතන පෙනෙනු ඇත.</p>
        <button id="closeBtn">වසා දමන්න</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('closeBtn').addEventListener('click', () => { tg.close(); });
    </script>
</body>
</html>
